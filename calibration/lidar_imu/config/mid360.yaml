# LiDAR_IMU_Init configuration for Livox Mid-360 + built-in IMU
#
# Adapted from LiDAR_IMU_Init/config/mid360.yaml for LingTu S100P robot.
#
# Key differences from upstream:
#   - imu_topic: /livox/imu (our standard topic name)
#   - mean_acc_norm: 1 (Livox built-in IMU outputs in g, not m/s^2)
#
# Usage:
#   roslaunch lidar_imu_init livox_mid360.launch
#   # Or use ROS2 adapter:
#   python calibration/lidar_imu/ros2_adapter/run_calibration.py \
#       --bag lidar_imu_bag --config calibration/lidar_imu/config/mid360.yaml

common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"

preprocess:
    lidar_type: 1                # 1 = Livox series (Mid-360, Avia, Horizon)
    feature_extract_en: false
    scan_line: 4                 # Mid-360 has 4 beams
    blind: 1                     # Ignore points within 1m

initialization:
    cut_frame_num: 5             # Split each LiDAR frame into 5 sub-frames
    orig_odom_freq: 10           # LiDAR scan rate (Hz)
    mean_acc_norm: 1             # 1 for Livox built-in IMU (outputs in g)
                                 # 9.805 for external IMU (outputs in m/s^2)
    online_refine_time: 20       # Continue refining for 20s after init
    data_accum_length: 500       # Number of IMU samples to accumulate
    Rot_LI_cov: [ 0.00005, 0.00005, 0.00005 ]
    Trans_LI_cov: [ 0.00001, 0.00001, 0.00001 ]

mapping:
    filter_size_surf: 0.05
    filter_size_map: 0.15
    gyr_cov: 2
    acc_cov: 2
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    det_range: 100.0

publish:
    path_en:  true
    scan_publish_en:  true
    dense_publish_en: true
    scan_bodyframe_pub_en: false

pcd_save:
    pcd_save_en: false
    interval: -1
