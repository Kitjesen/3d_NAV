# Allan Variance configuration for Livox Mid-360 built-in IMU
#
# Usage:
#   1. Record static IMU data (robot stationary, 2+ hours):
#      ros2 bag record /livox/imu -o imu_static_bag --duration 7200
#
#   2. Run Allan Variance analysis:
#      ros2 run allan_variance_ros2 allan_variance \
#          imu_static_bag calibration/imu/config/livox_mid360_imu.yaml
#
#   3. Analyze results:
#      python3 calibration/imu/allan_variance_ros2/src/allan_variance_ros2/scripts/analysis.py \
#          --data allan_variance.csv

# IMU topic name (Livox Mid-360 default)
imu_topic: '/livox/imu'

# Hardware IMU output rate (Hz)
# Livox Mid-360 built-in IMU: 200 Hz
imu_rate: 200

# Subsampling rate for analysis (Hz)
# Set equal to imu_rate for full-resolution analysis
measure_rate: 200

# Duration of data to analyze (seconds)
# Minimum 2 hours (7200s) recommended for reliable Allan Variance
# 3 hours (10800s) is ideal
sequence_duration: 7200

# Skip first N seconds (startup transients)
# 10 seconds to skip IMU initialization
sequence_offset: 10
