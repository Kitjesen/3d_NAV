// han_dog CMS gRPC 服务接口 (用于集成测试 mock server)
// 根据 han_dog_bridge.py 中的使用模式推导出的字段定义
// 字段编号需与实际 han_dog_message 包一致 (1-indexed 顺序推断)

syntax = "proto3";

package han_dog;

// ─── 基础消息 ─────────────────────────────────────────────
message Empty {}

message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Quaternion {
  float x = 1;
  float y = 2;
  float z = 3;
  float w = 4;
}

// ─── IMU ─────────────────────────────────────────────────
message Imu {
  Vector3    gyroscope  = 1;
  Quaternion quaternion = 2;
  uint64     timestamp  = 3;
}

// ─── 关节 ─────────────────────────────────────────────────
message Matrix4 {
  repeated float values = 1;
}

message AllJoints {
  Matrix4 position = 1;
  Matrix4 velocity = 2;
  Matrix4 torque   = 3;
}

message SingleJoint {
  int32 id       = 1;
  float position = 2;
  float velocity = 3;
  float torque   = 4;
}

message JointUpdate {
  oneof joint {
    AllJoints  all_joints   = 1;
    SingleJoint single_joint = 2;
  }
}

// ─── 历史 ─────────────────────────────────────────────────
message History {
  uint64 timestamp = 1;
}

// ─── CMS 服务 ─────────────────────────────────────────────
service Cms {
  // 生命周期控制
  rpc Enable   (Empty)   returns (Empty);
  rpc Disable  (Empty)   returns (Empty);
  rpc StandUp  (Empty)   returns (Empty);
  rpc SitDown  (Empty)   returns (Empty);

  // 运动控制
  rpc Walk (Vector3) returns (Empty);

  // 数据流
  rpc ListenImu     (Empty) returns (stream Imu);
  rpc ListenJoint   (Empty) returns (stream JointUpdate);
  rpc ListenHistory (Empty) returns (stream History);
}
