# =============================================================================
# Point-LIO Configuration -- Livox Mid-360 + 6-axis IMU
# =============================================================================
#
# Hardware: Livox Mid-360 LiDAR (360 deg FoV, 4 scan lines, ~200k pts/s)
#           6-axis IMU (built-in Mid-360 IMU, 200 Hz)
# Platform: RDK S100P (aarch64) / Jetson Orin NX 16GB
# ROS2:     Humble
#
# This config is for Point-LIO (hku-mars), a per-point processing variant of
# Fast-LIO2. Both use ikd-Tree and Iterated Error-State Kalman Filter, but
# Point-LIO processes each point individually (not scan-by-scan), yielding
# better accuracy under aggressive motion at the cost of higher CPU load.
#
# Reference: https://github.com/hku-mars/Point-LIO
# ROS2 port: https://github.com/GnehSizum/Point-LIO-ros2
#
# Parameters are organized into sections matching the Point-LIO codebase.
# Comments indicate which parameters are Point-LIO specific vs shared with
# our existing Fast-LIO2 config (src/slam/fastlio2/config/lio.yaml).
# =============================================================================

# --- ROS2 parameter namespace wrapper ---
/**:
    ros__parameters:

        # =====================================================================
        # common -- Topic names & frame combination/cutting
        # =====================================================================
        # These topic names must match our ROS2 topic contract.
        # In our system, the launch file remaps these to /nav/ prefixed topics,
        # but Point-LIO internally subscribes to these names.
        common:
            lid_topic: "livox/lidar"       # remapped to /nav/lidar_scan in launch
            imu_topic: "livox/imu"         # remapped to /nav/imu in launch

            # Frame combination: merge multiple LiDAR frames into one before processing.
            # Useful for low-frequency LiDARs. Mid-360 runs at 10 Hz -- not needed.
            con_frame: false               # [Point-LIO specific] combine frames
            con_frame_num: 1               # [Point-LIO specific] number of frames to combine

            # Frame cutting: split one LiDAR frame into sub-frames for finer
            # temporal resolution. Increases CPU load. Usually not needed for Mid-360.
            cut_frame: false               # [Point-LIO specific] cut frame into sub-frames
            cut_frame_time_interval: 0.1   # [Point-LIO specific] sub-frame interval (s)
                                           # should be integral fraction of 1/LiDAR_freq

            # Time offset between LiDAR and IMU timestamps, calibrated externally
            # (e.g., via LI-Init). The IMU timestamp is shifted by subtracting this
            # value to align with the LiDAR timeline.
            # Mid-360 built-in IMU is hardware-synced, so offset is near zero.
            time_diff_lidar_to_imu: 0.0    # [Point-LIO specific] seconds

        # =====================================================================
        # preprocess -- LiDAR type & point cloud preprocessing
        # =====================================================================
        preprocess:
            # LiDAR type enum: 1=AVIA (all Livox CustomMsg), 2=VELO16, 3=OUST64, 4=HESAIxt32
            # Mid-360 uses type 1 (AVIA) — all Livox LiDARs share CustomMsg format.
            lidar_type: 1                  # AVIA = Livox CustomMsg (Mid-360/Avia/HAP)

            scan_line: 4                   # [shared concept] Mid-360 has 4 scan lines
                                           # (AVIA=6, Velodyne16=16, Ouster64=64)

            # Timestamp unit in the PointCloud2 message's time/t field:
            # 0=second, 1=millisecond, 2=microsecond, 3=nanosecond
            # Livox Mid-360 via livox_ros_driver2 CustomMsg uses nanoseconds.
            timestamp_unit: 3              # [Point-LIO specific] nanosecond

            # Blind zone: ignore points closer than this distance (meters).
            # Mid-360 min range is ~0.1m, but close points cause noise. Our
            # Fast-LIO2 config uses lidar_min_range=0.5. Set to 0.5 for consistency.
            blind: 0.5                     # [shared concept] maps to lidar_min_range in lio.yaml

        # =====================================================================
        # mapping -- Core ESKF + ikd-Tree parameters
        # =====================================================================
        mapping:
            # --- IMU configuration ---
            imu_en: true                   # [Point-LIO specific] enable IMU fusion
                                           # (Fast-LIO2 always uses IMU)

            # Start from aggressive motion without static initialization.
            # If true, requires preknown gravity_init below.
            # Our robot starts stationary, so false.
            start_in_aggressive_motion: false  # [Point-LIO specific]

            # Online LiDAR-IMU extrinsic estimation.
            # Disable for aggressive motion. We have good calibration, so false.
            extrinsic_est_en: false        # [shared] same intent as esti_il in lio.yaml
                                           # lio.yaml: esti_il: false

            # IMU sampling interval (1 / IMU_frequency).
            # Mid-360 built-in IMU runs at 200 Hz.
            imu_time_inte: 0.005           # [Point-LIO specific] 1/200 = 0.005s

            # IMU saturation values -- points beyond these are clamped.
            # Not related to physical units, just a threshold for outlier rejection.
            satu_acc: 4.0                  # [Point-LIO specific] acceleration saturation
            satu_gyro: 35.0                # [Point-LIO specific] gyroscope saturation (rad/s)

            # Acceleration norm: 1.0 if IMU reports in g-units, 9.81 if m/s^2.
            # Livox Mid-360 built-in IMU reports in g-units.
            acc_norm: 1.0                  # [Point-LIO specific]

            # --- Noise covariances ---
            # Point-LIO uses a different noise model than Fast-LIO2.
            # Fast-LIO2 (lio.yaml) uses: na, ng, nba, nbg (simpler notation).
            # Point-LIO separates input/output model covariances.

            # LiDAR measurement covariance (per-point noise).
            # Lower = trust LiDAR more. Mid-360 has good accuracy at short range.
            lidar_meas_cov: 0.1            # [Point-LIO specific] (lio.yaml: lidar_cov_inv=1000)

            # Process noise -- output model (propagation noise in the ESKF output).
            acc_cov_output: 500.0          # [Point-LIO specific] acceleration process noise (output)
            gyr_cov_output: 1000.0         # [Point-LIO specific] gyroscope process noise (output)

            # Bias random walk covariance.
            # Equivalent to nba/nbg in lio.yaml. Using same values.
            b_acc_cov: 0.0001              # [shared] same as lio.yaml nba=0.0001
            b_gyr_cov: 0.0001              # [shared] same as lio.yaml nbg=0.0001

            # IMU measurement covariance (observation noise in the ESKF).
            imu_meas_acc_cov: 0.1          # [Point-LIO specific] accelerometer measurement noise
            imu_meas_omg_cov: 0.1          # [Point-LIO specific] gyroscope measurement noise

            # Process noise -- input model (used when use_imu_as_input=true).
            # Maps roughly to na/ng in lio.yaml but with different scaling.
            gyr_cov_input: 0.01            # [Point-LIO specific] (lio.yaml: ng=0.01)
            acc_cov_input: 0.1             # [Point-LIO specific] (lio.yaml: na=0.01)

            # Velocity covariance (Point-LIO estimates velocity in state).
            vel_cov: 20.0                  # [Point-LIO specific] velocity process noise

            # --- ikd-Tree & map parameters ---
            # Plane fitting threshold: smaller = stricter planarity requirement.
            plane_thr: 0.1                 # [Point-LIO specific] (lio.yaml: implicit in ESKF)

            # Nearest neighbor search parameter for ikd-Tree matching.
            match_s: 81.0                  # [Point-LIO specific]

            # Field of view: Mid-360 is 360 degrees horizontal.
            fov_degree: 360.0              # [shared concept] lio.yaml doesn't specify (implicit)

            # Detection range (meters). Mid-360 max range is ~40m (90% reflectivity)
            # to ~70m (low reflectivity). Set conservatively.
            det_range: 50.0                # [shared concept] lio.yaml: det_range=60

            # Gravity alignment: align world z-axis with gravity direction.
            gravity_align: true            # [shared] same as lio.yaml gravity_align=true

            # Gravity vector in world frame (target alignment).
            gravity: [0.0, 0.0, -9.810]   # [Point-LIO specific] (lio.yaml: implicit)

            # Pre-known gravity in the first IMU body frame.
            # Used when imu_en=false or start_in_aggressive_motion=true.
            gravity_init: [0.0, 0.0, -9.810]  # [Point-LIO specific]

            # --- LiDAR-IMU extrinsic calibration ---
            # Rotation (row-major 3x3) and translation from IMU to LiDAR frame.
            # These MUST match our hardware calibration from lio.yaml.
            # Identity rotation: IMU and LiDAR frames are aligned.
            extrinsic_T: [-0.011, -0.02329, 0.04412]  # [shared] same as lio.yaml t_il
            extrinsic_R: [1.0, 0.0, 0.0,              # [shared] same as lio.yaml r_il
                          0.0, 1.0, 0.0,               # (identity -- IMU co-located with LiDAR
                          0.0, 0.0, 1.0]               #  in the Mid-360 housing)

        # =====================================================================
        # Launch-level parameters (set in launch file or here)
        # =====================================================================
        # These are typically set in the launch file <param> tags in original
        # Point-LIO, but ROS2 ports read them from the YAML config.

        # IMU as input vs. output model:
        #   false (0): IMU as output -- recommended for most cases, more stable.
        #   true  (1): IMU as input  -- can be more accurate but sensitive to noise.
        use_imu_as_input: false            # [Point-LIO specific] use output model

        # Propagate state at IMU frequency (200 Hz) between LiDAR points.
        # true = higher accuracy, higher CPU. Recommended for per-point processing.
        prop_at_freq_of_imu: true          # [Point-LIO specific]

        # Check IMU saturation: clamp IMU readings exceeding satu_acc/satu_gyro.
        check_satu: true                   # [Point-LIO specific]

        # Initial map size for ikd-Tree (number of initial scans to accumulate).
        init_map_size: 10                  # [Point-LIO specific]

        # Point filter: keep every N-th point. Downsampling for computational savings.
        # 1 = keep all points (highest accuracy, highest CPU).
        # 4 = keep 1/4 of points (good for dense LiDARs like Mid-360).
        # Mid-360 produces ~200k pts/s; with 4 we get ~50k pts/s -- reasonable
        # for Jetson Orin NX / RDK S100P.
        point_filter_num: 4                # [Point-LIO specific] (lio.yaml: lidar_filter_num=6)

        # Spatial downsampling via voxel grid after feature extraction.
        space_down_sample: true            # [Point-LIO specific]

        # Voxel filter size for current scan (meters).
        # Our lio.yaml uses scan_resolution=0.15. Point-LIO default is 0.3-0.5.
        # Use 0.15 to match our existing resolution for consistent map quality.
        filter_size_surf: 0.15             # [Point-LIO specific] (lio.yaml: scan_resolution=0.15)

        # Voxel filter size for map points (meters).
        # Our lio.yaml uses map_resolution=0.3. Keep consistent.
        filter_size_map: 0.3               # [Point-LIO specific] (lio.yaml: map_resolution=0.3)

        # ikd-Tree cube side length (meters). Defines the local map extent.
        cube_side_length: 2000.0           # [shared concept] same as lio.yaml cube_len=2000

        # Runtime position logging to file (for debugging).
        runtime_pos_log_enable: false      # [Point-LIO specific]

        # =====================================================================
        # odometry -- Odometry publishing options
        # =====================================================================
        odometry:
            # Publish odometry at every IMU update (before scan downsampling).
            # true = higher frequency odometry output (~200 Hz).
            # false = publish only after full scan processing (~10 Hz).
            publish_odometry_without_downsample: false  # [Point-LIO specific]

        # =====================================================================
        # publish -- Output configuration
        # =====================================================================
        publish:
            path_en: true                  # [Point-LIO specific] publish nav_msgs/Path
            scan_publish_en: true          # [Point-LIO specific] publish registered cloud
            scan_bodyframe_pub_en: true    # MUST be true: /nav/registered_cloud needs body frame
            tf_send_en: true               # broadcast TF: odom -> body

        # =====================================================================
        # pcd_save -- PCD file saving (offline mapping / debugging)
        # =====================================================================
        pcd_save:
            pcd_save_en: false             # [Point-LIO specific] save map to PCD
            interval: -1                   # [Point-LIO specific] frames per PCD file
                                           # -1 = all frames in one file (memory risk)
