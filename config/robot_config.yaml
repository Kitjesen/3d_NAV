# ═══════════════════════════════════════════════════════════════
# 3d_NAV Robot Configuration — 机器人物理参数集中配置
#
# 此文件是所有机器人特定参数的唯一来源 (single source of truth)。
# launch 文件和 grpc_gateway.yaml 中的默认值均从此处读取。
# 切换机器人型号时，只需修改此文件即可。
#
# 注意:
#   - launch 参数仍可通过命令行覆盖:
#     ros2 launch navigation_run.launch.py maxSpeed:=1.5
#   - 话题名称不在此文件中，请参考 config/topic_contract.yaml
# ═══════════════════════════════════════════════════════════════

# ── 机器人标识 ──
robot:
  id: "robot_001"
  hw_id: "dog_v2"
  firmware_version: "1.7.2"

# ── 几何尺寸 (m) ──
geometry:
  vehicle_height: 0.5
  vehicle_width: 0.6
  vehicle_length: 1.0
  sensor_offset_x: 0.3
  sensor_offset_y: 0.0

# ── 速度限制 (m/s, rad/s) ──
speed:
  max_linear: 1.0
  max_angular: 1.0
  max_speed: 0.875          # launch 层 maxSpeed 默认值
  autonomy_speed: 0.875     # launch 层 autonomySpeed 默认值

# ── 安全参数 ──
safety:
  obstacle_height_thre: 0.2   # 障碍物高度阈值 (m)
  ground_height_thre: 0.1     # 地面高度阈值 (m)
  stop_distance: 0.8          # 急停距离 (m)
  slow_distance: 2.0          # 减速距离 (m)
  deadman_timeout_ms: 300.0   # 遥控超时 (ms)
  cmd_vel_timeout_ms: 200.0   # 底盘指令超时 (ms)
  tilt_limit_deg: 30.0        # 倾斜限制 (deg)

# ── 底盘驱动 ──
# dog_host: brainstem CMS 地址，通过 WiFi 通信
#   同板测试: "127.0.0.1"
#   分板部署: 填狗板 WiFi IP (如 "192.168.66.xxx")
driver:
  dog_host: "127.0.0.1"
  dog_port: 13145
  control_rate: 50.0          # Hz
  auto_enable: true
  auto_standup: true
  reconnect_interval: 3.0     # 秒
  slam_reset_interval: 5.0    # SLAM 位置重置间隔 (秒)，防止航位推算漂移

# ── LiDAR 传感器 ──
lidar:
  frame_id: "livox_frame"
  publish_freq: 10.0          # Hz
  # LiDAR 安装外参 (body → lidar TF, 单位 m / rad)
  # 用于 static_transform_publisher 和 C++ 坐标变换
  offset_x:  -0.011
  offset_y:  -0.02329
  offset_z:   0.04412
  roll:       0.0
  pitch:      0.0
  yaw:        0.0
  # 相机相对于 LiDAR 的 Z 偏移 (for visualization TF)
  camera_offset_z: 0.0

# ── 相机传感器 ──
# 出厂标定值 — 客户无需修改
camera:
  # 相机安装外参 (body → camera 静态变换)
  # position: 相机在机体坐标系下的位置 (m)
  position_x:  0.15          # 前方 15cm (机头方向)
  position_y:  0.00          # 中线
  position_z:  0.45          # 离地 45cm
  # rotation: 相机光轴相对于机体前向的旋转 (rad)
  # 默认: 相机朝前安装, 光学坐标 Z 轴 = 机体 X 轴(前)
  roll:         0.0
  pitch:        0.0
  yaw:          0.0
  # 内参默认值 (ROS2 CameraInfo 到达后会覆盖)
  fx: 615.0
  fy: 615.0
  cx: 320.0
  cy: 240.0
  width: 640
  height: 480
  depth_scale: 0.001         # 原始深度值 → 米 (1mm 单位)
  # 相机安装旋转补偿 (度): 0=正装, 90=顺时针90°侧装, 180=倒装, 270=逆时针90°
  rotate: 270
  # 畸变系数 (Brown-Conrady / plumb_bob 模型)
  dist_k1: 0.0
  dist_k2: 0.0
  dist_p1: 0.0
  dist_p2: 0.0
  dist_k3: 0.0

# ── 服务端口 ──
gateway:
  port: 5050               # Dashboard HTTP/WS/SSE (GatewayModule)
  mcp_port: 8090           # MCP JSON-RPC (MCPServerModule)
brainstem:
  host: "127.0.0.1"
  port: 13145              # Brainstem gRPC (运动控制)

# ── GNSS (WTRTK-980) ──
# 硬件: WitMotion WTRTK-980 (UM980 芯片, 单天线 RTK, 50Hz)
# 驱动: ironoa/um982_ros2_driver (systemd: gnss.service)
# 融合: fastlio2_gnss backend (GTSAM PGO 全局约束)
gnss:
  enabled: false                   # 全局开关，未接入前保持 false
  model: "WTRTK-980"
  device: "/dev/ttyUSB0"           # UART 设备 (CH340 USB-UART)
  baud: 115200                     # UM980 默认 115200 (可通过 CONFIG COM1 460800 提速)

  # 天线相对 body 原点的安装偏移 (m, body frame)
  antenna_offset:
    x: 0.00                        # 前后
    y: 0.00                        # 左右
    z: 0.45                        # 离地高度

  # ROS2 topic (ironoa 驱动发布，LingTu 通过 DDS 订阅)
  topic_fix: "/gps/fix"             # sensor_msgs/NavSatFix (50Hz)
  topic_odom: "/gps/odom"           # nav_msgs/Odometry (UTM, 50Hz)
  topic_vel: "/gps/vel"             # geometry_msgs/TwistStamped

  # 地图原点 (WGS84 → ENU 参考点)
  # null = 首次运行自动锁定当前 GNSS 位置为原点并写回文件
  origin:
    lat: null
    lon: null
    alt: null
    auto_init: true                # 自动初始化

  # 质量控制 (坏质量的 fix 会被加大协方差或丢弃)
  quality:
    min_sat_used: 8                # 最少使用卫星数
    max_hdop: 2.5                  # HDOP 上限
    max_age_s: 2.0                 # 数据最大老化时间
    require_fix_type: 1            # 1=Single, 4=RTK_FIXED (最低接受等级)
    allow_float: true              # 允许 RTK Float (权重降到 0.3)

  # RTCM 差分 (千寻/移动 CORS NTRIP, 可选)
  rtcm:
    enabled: false
    ntrip_host: "rtk.ntrip.qxwz.com"
    ntrip_port: 8001
    ntrip_mount: "RTCM32_GGB"
    ntrip_user: ""
    ntrip_pass: ""

  # 融合后端
  fusion:
    backend: "fastlio2_gnss"       # fastlio2_gnss | glio
    factor_weight_fix: 1.0         # RTK Fix 权重 (GTSAM factor)
    factor_weight_float: 0.3       # RTK Float 权重
    factor_weight_single: 0.05     # Single 权重

# ── 路径跟踪控制增益 ──
control:
  yaw_rate_gain: 7.5
  stop_yaw_rate_gain: 7.5
  max_yaw_rate: 45.0          # deg/s
  max_accel: 1.0              # m/s^2

# ── 自主导航延迟参数 ──
autonomy:
  joy_to_speed_delay: 2.0        # 手柄输入后多久开始用 speed topic 控速 (s)
  joy_to_check_obstacle_delay: 5.0  # 手柄输入后多久恢复避障检测 (s)

# ── 路径跟随高级 (pathFollower) ──
path_follower:
  switch_time_thre: 1.0       # 方向切换延迟 (s)
  dir_diff_thre: 0.1          # 方向差阈值 (rad)
  incl_rate_thre: 120.0       # 倾斜变化率阈值 (°/s)
  slow_rate_1: 0.25
  slow_rate_2: 0.5
  slow_rate_3: 0.75
  slow_time_1: 2.0            # s
  slow_time_2: 2.0            # s
  incl_thre: 45.0             # 坡度停车阈值 (°)
  stop_time: 5.0              # 停车等待时间 (s)
  pub_skip_num: 1
  use_incl_rate_to_slow: false
  use_incl_to_stop: false
  no_rot_at_stop: false
  no_rot_at_goal: true
  stuck_timeout: 10.0         # 卡死超时时间 (s)
  stuck_dist_thre: 0.15       # 超时期间最小移动距离 (m)

# ── 地形分析高级 (terrainAnalysis) ──
terrain:
  quantile_z: 0.25
  use_sorting: true
  consider_drop: false
  limit_ground_lift: false
  max_ground_lift: 0.15       # m
  clear_dy_obs: false
  min_dy_obs_dis: 0.3         # m
  abs_dy_obs_rel_z_thre: 0.2  # m
  min_dy_obs_vfov: -16.0      # °
  max_dy_obs_vfov: 16.0       # °
  min_dy_obs_point_num: 1
  no_data_obstacle: false
  no_data_block_skip_num: 0
  min_block_point_num: 10
  voxel_point_update_thre: 100
  voxel_time_update_thre: 2.0 # s
  min_rel_z: -1.5             # m
  max_rel_z: 0.2              # m
  dis_ratio_z: 0.2
  terrain_under_vehicle: -0.2 # m
  terrain_conn_thre: 0.5      # m
  ceiling_filtering_thre: 2.0 # m
  check_collision: true

# ── 局部规划高级 (localPlanner) ──
local_planner:
  two_way_drive: true
  check_obstacle: true
  check_rot_obstacle: false
  cost_height_thre_1: 0.15    # m
  cost_height_thre_2: 0.1     # m
  use_cost: false
  slow_path_num_thre: 5
  slow_group_num_thre: 1
  point_per_path_thre: 2
  dir_weight: 0.02
  dir_thre: 90.0              # °
  dir_to_vehicle: false
  min_path_range: 1.0         # m
  path_range_step: 0.5        # m
  path_range_by_speed: true
  path_crop_by_goal: true
  freeze_ang: 90.0            # °
  freeze_time: 2.0            # s
  goal_clear_range: 0.5       # m
  goal_behind_range: 0.8      # m
  laser_voxel_size: 0.05      # m

# ── 围栏扩展 ──
geofence:
  check_hz: 20.0              # Hz
  warn_margin: 3.0            # m
  stop_margin: 0.5            # m
  enabled: false

# ── Tomogram 构建 (build_tomogram_from_pcd) ──
# map save 时用这些参数从 PCD 生成 tomogram
tomogram:
  resolution: 0.2              # 格网分辨率 (m)
  slice_dh: 0.5                # 垂直切片间距 (m)，层数自动算
  ground_h: 0.0                # 地面基准高度 (m)
  # 可通行性分析
  kernel_size: 7               # 地形分析卷积核大小
  interval_min: 0.50           # 最小可通行间隔 — 地面到障碍物 (m)
  interval_free: 0.65          # 自由通行间隔 — 机器人高度 (m)
  slope_max: 1.00              # 最大坡度 (tan值, 45°) — 四足极限
  step_max: 0.17               # 最大台阶高度 (m)
  standable_ratio: 0.20        # 可站立面积比例
  cost_barrier: 50.0           # 障碍物代价阈值 (≥此值不可通行)
  safe_margin: 0.4             # 安全边距 (m)
  inflation: 0.2               # 障碍膨胀半径 (m)

# ── PCT 全局规划器 ──
pct_planner:
  default_goal_height: 0.0    # 2D工具目标未设z时的备用高度 (m)
  publish_map_pointcloud: true # 发布 /map_pointcloud 供 RViz2 3D 点击使用
  publish_tomogram: true       # 发布 /tomogram 可视化
  smooth_min_dist: 3             # 路径平滑最小格距 (格数)
  loc_quality_min: 0.3           # ICP定位质量最低阈值，低于此值拒绝规划
  smooth_method: catmull_rom   # 路径平滑方式: catmull_rom / downsample
  smooth_interp: 3             # Catmull-Rom 每段插值点数

# ── TraversabilityCost 分层代价融合 ──
# 合并规则: max() 优先级 — LETHAL(100) > INSCRIBED(99) > slope(1-98) > proximity(0-50)
# 硬约束 (obstacle/steep slope) 不可被软层覆盖
# max_slope_deg: 默认从 terrain_analysis.slope_max (tan 值) 自动转换，四足 45°
traversability_cost:
  safe_distance: 1.5           # ESDF 接近性衰减距离 (m), 此范围内 soft cost 递增
  # max_slope_deg:             # 不设 → 从 terrain_analysis.slope_max 读取 (单一来源)
  proximity_cap: 50.0          # ESDF 软代价上限 (不会推升到 INSCRIBED=99)
  publish_hz: 2.0              # 融合发布频率 (Hz)

# ── OccupancyGrid 实时栅格 ──
occupancy_grid:
  resolution: 0.2              # 格网分辨率 (m)
  map_radius: 30.0             # 机器人中心半径 (m)
  z_min: 0.10                  # 忽略低于此高度的点 (m) — 地面
  z_max: 2.00                  # 忽略高于此高度的点 (m) — 天花板
  inflation_radius: 0.50       # 障碍膨胀半径 (m) ≈ 机器人半宽
  publish_hz: 2.0              # 发布频率 (Hz)

# ── 健康监控 ──
health:
  eval_hz: 5.0                # Hz
  rate_window_sec: 2.0        # s
