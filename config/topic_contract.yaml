# ═══════════════════════════════════════════════════════════════
# 3d_NAV Topic Interface Contract
#
# 定义所有模块之间通信的标准话题名称。
# 具体算法通过 launch profile 将自身话题 remap 到这些标准名称。
# 高层模块 (grpc_gateway, StatusAggregator 等) 只依赖这些标准名称。
#
# 规则:
#   - 所有标准话题以 /nav/ 为前缀
#   - 添加新算法时, 只需创建对应的 launch profile 并 remap 到这些标准话题
#   - 不要修改此文件中的话题名, 除非进行全量迁移
# ═══════════════════════════════════════════════════════════════

# ── 传感器层 ──
sensor:
  lidar_scan: /nav/lidar_scan           # livox_ros_driver2/CustomMsg 或 sensor_msgs/PointCloud2
  imu: /nav/imu                         # sensor_msgs/Imu

# ── SLAM 层 ──
slam:
  odometry: /nav/odometry               # nav_msgs/Odometry — 唯一发布者: Fast-LIO2 (含位置+姿态)
  registered_cloud: /nav/registered_cloud  # sensor_msgs/PointCloud2 (机体坐标系)
  map_cloud: /nav/map_cloud             # sensor_msgs/PointCloud2 (世界坐标系)
  save_map_service: /nav/save_map       # interface/srv/SaveMaps
  dog_odometry: /nav/dog_odometry       # nav_msgs/Odometry — han_dog_bridge IMU 姿态反馈 (仅姿态+角速度，无位置)

# ── 定位层 ──
localization:
  quality: /nav/localization_quality      # std_msgs/Float32 (ICP 匹配质量)
  relocalize_service: /nav/relocalize     # interface/srv/Relocalize
  relocalize_check_service: /nav/relocalize_check  # interface/srv/IsValid (检查重定位是否完成)

# ── 全局规划层 ──
planning:
  global_path: /nav/global_path         # nav_msgs/Path (全局路径)
  planner_status: /nav/planner_status   # std_msgs/String 纯字符串: "IDLE"/"PLANNING"/"SUCCESS"/"FAILED"/"WARN_STUCK"/"STUCK" (global_planner + pathFollower 发布; WARN_STUCK=半超时预警, STUCK=全超时确认卡死)
  adapter_status: /nav/adapter_status   # std_msgs/String JSON: {"event":...,"index":N,"total":N} (pct_path_adapter 发布; event: path_received/waypoint_reached/goal_reached/replanning/stuck_final/failed)
  mission_status: /nav/mission_status   # std_msgs/String JSON: {"state","goal","progress","replan_count","elapsed_sec","estop","failure_reason"} (mission_arc 发布; state: IDLE/PLANNING/EXECUTING/RECOVERING/REPLANNING/COMPLETE/FAILED)

# ── 自主导航层 ──
autonomy:
  terrain_map: /nav/terrain_map         # sensor_msgs/PointCloud2 (基础地形图)
  terrain_map_ext: /nav/terrain_map_ext # sensor_msgs/PointCloud2 (扩展地形图)
  local_path: /nav/local_path           # nav_msgs/Path (局部路径)
  cmd_vel: /nav/cmd_vel                 # geometry_msgs/TwistStamped (速度指令)
  stop: /nav/stop                       # std_msgs/Int8 (急停)
  slow_down: /nav/slow_down             # std_msgs/Int8 (减速)
  way_point: /nav/way_point             # geometry_msgs/PointStamped (目标航点)
  speed: /nav/speed                     # std_msgs/Float32 (速度倍率)
  # 可选控制话题 (无发布者时节点静默等待，不影响正常导航)
  map_clearing: /nav/map_clearing       # std_msgs/Float32 (terrain_analysis 地形清除半径)
  cloud_clearing: /nav/cloud_clearing   # std_msgs/Float32 (terrain_analysis_ext 点云清除半径)
  navigation_boundary: /nav/navigation_boundary  # geometry_msgs/PolygonStamped (导航边界多边形)
  added_obstacles: /nav/added_obstacles # sensor_msgs/PointCloud2 (动态附加障碍物)
  check_obstacle: /nav/check_obstacle   # std_msgs/Bool (障碍物检测开关)
  nav_state: /nav/nav_state   # std_msgs/String JSON: {"planner_status","loc_quality","stuck"} (预留，待实现)

# ── 高层控制 ──
control:
  goal_pose: /nav/goal_pose             # geometry_msgs/PoseStamped (导航目标)
  patrol_goals: /nav/patrol_goals       # std_msgs/String JSON: {waypoints, loop, route_name} (巡检路线 → mission_arc)
  cancel: /nav/cancel                   # std_msgs/Empty (取消当前任务)

# ── 语义导航层 (VLN) ──
# 所有语义话题在 /nav/semantic/ 命名空间下, 与几何导航零冲突。
# 语义模块未启动时这些话题不存在, 现有系统完全不受影响。
semantic:
  detections_3d: /nav/semantic/detections_3d    # vision_msgs/Detection3DArray (3D 检测结果)
  scene_graph: /nav/semantic/scene_graph        # std_msgs/String (JSON 场景图)
  query_service: /nav/semantic/query            # 自定义 srv: string → ObjectMatch[]
  instruction: /nav/semantic/instruction        # std_msgs/String (自然语言指令)
  resolved_goal: /nav/goal_pose                 # geometry_msgs/PoseStamped (解析后的目标，直连 PCT Planner)
  status: /nav/semantic/status                  # std_msgs/String (JSON: 阶段/目标/置信度)
  costmap: /nav/costmap                          # nav_msgs/OccupancyGrid (optional, planner→perception SCG 内部接口)
  voice_response: /nav/voice/response          # std_msgs/String JSON: {response: "好的", timestamp, instruction}

# ── 三环认知架构 (nav_rings) ──
# Ring 1 反射弧 / Ring 2 认知环 / Ring 3 对话环
rings:
  safety_state: /nav/safety_state          # std_msgs/String (JSON: level, links, issues)
  execution_eval: /nav/execution_eval      # std_msgs/String (JSON: assessment, cross_track_error, progress_rate)
  dialogue_state: /nav/dialogue_state      # std_msgs/String (JSON: understood, doing, progress_pct, safety, eta_sec)

# ── 运营服务 (nav_services) ──
# 命令/响应模式: 客户端发 command, 节点回 response
services:
  # 地图管理
  map_command: /nav/map/command            # std_msgs/String JSON: {action: list|save|delete|rename|set_active, name, ...}
  map_response: /nav/map/response          # std_msgs/String JSON: {action, success, maps, message}
  poi_command: /nav/poi/command            # std_msgs/String JSON: {action: set|delete|list|navigate, name, x, y, z}
  poi_response: /nav/poi/response          # std_msgs/String JSON: {action, success, pois, message}

  # 巡检路线
  patrol_command: /nav/patrol/command      # std_msgs/String JSON: {action: save|load|list|delete|start|stop, name, waypoints, loop}
  patrol_response: /nav/patrol/response    # std_msgs/String JSON: {action, success, routes, message}

  # 电子围栏
  geofence_command: /nav/geofence/command  # std_msgs/String JSON: {action: add|remove|list|clear|enable|disable, name, polygon}
  geofence_response: /nav/geofence/response  # std_msgs/String JSON: {action, success, fences, message}

  # 定时任务
  schedule_command: /nav/schedule/command   # std_msgs/String JSON: {action: add|remove|list|enable|disable, name, patrol_route, hour, minute, weekdays}
  schedule_response: /nav/schedule/response  # std_msgs/String JSON: {action, success, schedules, message}

  # 任务历史
  history_query: /nav/history/query        # std_msgs/String JSON: {action: list|detail, count, id}
  history_response: /nav/history/response  # std_msgs/String JSON: {action, missions, detail}

# ── TF 坐标系 ──
tf:
  map_frame: map
  odom_frame: odom
  body_frame: body
