algorithm_interfaces:
  fastlio_mapping:
    inputs: [/nav/lidar_scan, /nav/imu]
    outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    owner: slam
    map_dependency: none_live_canonical_sensor_slam
  fastlio_raw_validation:
    inputs: [/points_raw, /imu_raw]
    outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    owner: slam_sim_validation
    map_dependency: none_live_raw_sensor_slam
  exploration_strategy:
    inputs: [/nav/odometry, /nav/map_cloud, /nav/exploration_grid]
    outputs: [/exploration/way_point]
    owner: tare_or_frontier
    map_dependency: live_map_or_occupancy_grid
  wavefront_frontier_exploration:
    inputs: [/nav/odometry, /nav/exploration_grid]
    outputs: [/nav/goal_pose]
    owner: lingtu_frontier
    map_dependency: live_occupancy_grid_unknown_free_boundary
  traversable_frontier_preview:
    inputs: [/nav/odometry, /nav/exploration_grid, module:TraversableFrontierModule.fused_cost, module:TraversableFrontierModule.slope_grid, module:TraversableFrontierModule.esdf_field, module:TraversableFrontierModule.elevation_map]
    outputs: [/nav/traversable_frontiers, /nav/frontier_candidate]
    owner: lingtu_traversable_frontier
    map_dependency: live_occupancy_grid_and_traversability_layers_read_only_preview
  tare_exploration:
    inputs: [/nav/odometry, /nav/map_cloud, /nav/terrain_map_ext]
    outputs: [/exploration/way_point]
    owner: tare_external_or_lingtu_tare_adapter
    map_dependency: live_registered_scan_or_terrain_map_ext
  global_planning:
    inputs: [/nav/odometry, /nav/map_cloud, /exploration/way_point, /nav/goal_pose]
    outputs: [/nav/global_path]
    owner: lingtu_navigation
    map_dependency: planner_specific_pct_saved_tomogram_or_astar_occupancy_grid
  astar_global_planning:
    inputs: [/nav/odometry, /nav/exploration_grid, /nav/goal_pose]
    outputs: [/nav/global_path]
    owner: lingtu_navigation
    map_dependency: live_or_saved_occupancy_grid
  pct_global_planning:
    inputs: [/nav/odometry, artifact:tomogram, /nav/goal_pose]
    outputs: [/nav/global_path]
    owner: lingtu_pct
    map_dependency: same_source_saved_tomogram_required
  local_planning_and_following:
    inputs: [/nav/odometry, /nav/registered_cloud, /nav/global_path]
    outputs: [/nav/local_path, /nav/cmd_vel]
    owner: lingtu_autonomy
    map_dependency: current_registered_cloud_and_path

runtime_data_flow_stage_algorithm_interfaces:
  slam_or_relayed_localization_map: [fastlio_mapping, fastlio_raw_validation]
  map_layers_and_exploration: [exploration_strategy, wavefront_frontier_exploration, traversable_frontier_preview, tare_exploration]
  global_planning: [global_planning, astar_global_planning, pct_global_planning]
  local_planning_and_following: [local_planning_and_following]

runtime_data_flow:
  - name: endpoint_adapter
    inputs: [source:data_source.source_outputs]
    outputs: [source:data_source.normalized_outputs]
    owner: endpoint_adapter
    frame_role: native_to_canonical
    map_dependency: declared_by_data_source
  - name: slam_or_relayed_localization_map
    inputs:
      - /nav/lidar_scan
      - /nav/imu
      - /points_raw
      - /imu_raw
      - source:data_source.algorithm_entry_outputs
    outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    owner: slam_or_source_adapter
    frame_role: map_odom_body
    map_dependency: declared_by_data_source
  - name: map_layers_and_exploration
    inputs:
      - /nav/odometry
      - /nav/registered_cloud
      - /nav/map_cloud
      - /nav/exploration_grid
      - /nav/terrain_map_ext
      - module:TraversableFrontierModule.fused_cost
