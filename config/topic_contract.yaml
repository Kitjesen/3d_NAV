runtime_data_flow_topics:
  in_process_stub: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud, /nav/exploration_grid, /nav/terrain_map_ext, /exploration/way_point, /nav/goal_pose, /nav/traversable_frontiers, /nav/frontier_candidate, /nav/global_path, /nav/local_path, /nav/cmd_vel, /nav/added_obstacles, /nav/check_obstacle, /nav/planner_status]
  real_s100p: [/nav/lidar_scan, /nav/imu, /nav/odometry, /nav/registered_cloud, /nav/map_cloud, /nav/localization_health, /nav/localization_quality, /nav/exploration_grid, /nav/terrain_map_ext, /exploration/way_point, /nav/goal_pose, /nav/traversable_frontiers, /nav/frontier_candidate, /nav/global_path, /nav/local_path, /nav/cmd_vel, /nav/added_obstacles, /nav/check_obstacle, /nav/planner_status]
  mujoco_module_graph: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud, /nav/exploration_grid, /nav/terrain_map_ext, /exploration/way_point, /nav/goal_pose, /nav/traversable_frontiers, /nav/frontier_candidate, /nav/global_path, /nav/local_path, /nav/cmd_vel, /nav/added_obstacles, /nav/check_obstacle, /nav/planner_status]
  mujoco_fastlio2_live: [/points_raw, /imu_raw, /nav/odometry, /nav/registered_cloud, /nav/map_cloud, /nav/exploration_grid, /nav/terrain_map_ext, /exploration/way_point, /nav/goal_pose, /nav/traversable_frontiers, /nav/frontier_candidate, /nav/global_path, /nav/local_path, /nav/cmd_vel, /nav/added_obstacles, /nav/check_obstacle, /nav/planner_status]
  rosbag_fastlio2_replay: [/points_raw, /imu_raw, /nav/odometry, /nav/registered_cloud, /nav/map_cloud, /nav/exploration_grid, /nav/terrain_map_ext, /exploration/way_point, /nav/goal_pose, /nav/traversable_frontiers, /nav/frontier_candidate, /nav/global_path, /nav/local_path, /nav/cmd_vel, /nav/added_obstacles, /nav/check_obstacle, /nav/planner_status]
  gazebo_industrial: [/model/thunder/odometry, /lingtu/gazebo/raw/lidar_points, /lingtu/gazebo/raw/lidar_scan, /nav/odometry, /nav/state_estimation_at_scan, /nav/registered_cloud, /nav/map_cloud, /nav/exploration_grid, /nav/terrain_map_ext, /exploration/way_point, /nav/goal_pose, /nav/traversable_frontiers, /nav/frontier_candidate, /nav/global_path, /nav/local_path, /nav/cmd_vel, /nav/added_obstacles, /nav/check_obstacle, /nav/planner_status, /lingtu/gazebo/cmd_vel]
