# LingTu Runtime Stream Token Contract
#
# This file mirrors the canonical Python runtime contract in
# src/core/runtime_interface.py. Keep simulator adapters and real robot
# adapters aligned to that module; this YAML is the human-readable operations
# contract used by docs, diagnostics, and static validation. The historical
# field names still use "topic" for API compatibility, but these entries are
# canonical runtime stream tokens, not ROS2 topic names.
#
# Rules:
#   - High-level LingTu modules consume canonical runtime stream tokens.
#   - Endpoint adapters are responsible for remapping simulator or hardware
#     native streams or topics into this contract.
#   - Do not change existing stream token names without a full migration.
#   - Keep comments in English to avoid encoding drift across Windows/Linux.

sensor:
  # Raw SLAM input topics used when a runtime validates Fast-LIO from sensors.
  raw_lidar_points: /points_raw          # sensor_msgs/PointCloud2 or Livox CustomMsg
  raw_imu: /imu_raw                      # sensor_msgs/Imu

  # Canonical post-adapter sensor topics for LingTu modules.
  lidar_scan: /nav/lidar_scan            # sensor_msgs/PointCloud2 or Livox CustomMsg
  imu: /nav/imu                          # sensor_msgs/Imu

slam:
  odometry: /nav/odometry                # nav_msgs/Odometry; canonical localization pose
  registered_cloud: /nav/registered_cloud # sensor_msgs/PointCloud2; robot/body frame
  map_cloud: /nav/map_cloud              # sensor_msgs/PointCloud2; map/world frame
  cumulative_map_cloud: /nav/cumulative_map_cloud # simulation/debug accumulated cloud
  saved_map_cloud: /nav/saved_map_cloud  # sensor_msgs/PointCloud2; static localization map
  save_map_service: /nav/save_map        # map-save service
  dog_odometry: /nav/dog_odometry        # robot proprioception feedback, not global pose

localization:
  quality: /nav/localization_quality
  health: /nav/localization_health       # LOCKED/LOST/RECOVERED or JSON equivalent
  state_estimation_at_scan: /nav/state_estimation_at_scan
  relocalize_service: /nav/relocalize
  global_relocalize_service: /nav/global_relocalize
  relocalize_check_service: /nav/relocalize_check

exploration:
  start: /exploration/start
  stop: /exploration/stop
  way_point: /exploration/way_point      # strategy waypoint from TARE/exploration
  exploration_grid: /nav/exploration_grid # nav_msgs/OccupancyGrid
  traversable_frontiers: /nav/traversable_frontiers # read-only candidate list
  frontier_candidate: /nav/frontier_candidate # read-only best candidate
  status: /exploration/status

planning:
  global_path: /nav/global_path          # nav_msgs/Path
  far_reach_goal: /nav/far_reach_goal
  planner_status: /nav/planner_status
  adapter_status: /nav/adapter_status
  mission_status: /nav/mission_status

autonomy:
  terrain_map: /nav/terrain_map          # sensor_msgs/PointCloud2
  terrain_map_ext: /nav/terrain_map_ext  # sensor_msgs/PointCloud2
  local_path: /nav/local_path            # nav_msgs/Path
  cmd_vel: /nav/cmd_vel                  # geometry_msgs/TwistStamped or Twist adapter
  stop: /nav/stop
  slow_down: /nav/slow_down
  way_point: /nav/way_point              # current execution waypoint/progress marker
  speed: /nav/speed

  # Optional control topics. Nodes must tolerate these being absent.
  map_clearing: /nav/map_clearing
  cloud_clearing: /nav/cloud_clearing
  navigation_boundary: /nav/navigation_boundary
  added_obstacles: /nav/added_obstacles
  check_obstacle: /nav/check_obstacle
  nav_state: /nav/nav_state

control:
  goal_pose: /nav/goal_pose              # geometry_msgs/PoseStamped
  goal_point: /nav/goal_point            # geometry_msgs/PointStamped
  patrol_goals: /nav/patrol_goals        # JSON route command
  cancel: /nav/cancel

semantic:
  detections_3d: /nav/semantic/detections_3d
  scene_graph: /nav/semantic/scene_graph
  query_service: /nav/semantic/query
  instruction: /nav/semantic/instruction
  cancel: /nav/semantic/cancel
  resolved_goal: /nav/goal_pose
  status: /nav/semantic/status
  costmap: /nav/costmap
  scg_plan_request: /nav/scg/plan_request
  scg_plan_result: /nav/scg/plan_result
  voice_response: /nav/voice/response

reconstruction:
  semantic_cloud: /nav/reconstruction/semantic_cloud
  stats: /nav/reconstruction/stats
  save_ply_service: /nav/reconstruction/save_ply

rings:
  safety_state: /nav/safety_state
  execution_eval: /nav/execution_eval
  dialogue_state: /nav/dialogue_state

services:
  map_command: /nav/map/command
  map_response: /nav/map/response
  poi_command: /nav/poi/command
  poi_response: /nav/poi/response
  patrol_command: /nav/patrol/command
  patrol_response: /nav/patrol/response
  geofence_command: /nav/geofence/command
  geofence_response: /nav/geofence/response
  schedule_command: /nav/schedule/command
  schedule_response: /nav/schedule/response
  history_query: /nav/history/query
  history_response: /nav/history/response

visualization:
  detections: /nav/detections          # visualization_msgs/MarkerArray
  robot_marker: /nav/robot_marker      # visualization_msgs/Marker
  building_cloud: /nav/building_cloud  # sensor_msgs/PointCloud2 demo/reference cloud

required_nav_topics:
  # P0 runtime topics that must appear in product-relevant mapping,
  # exploration, and navigation gates. Other /nav/* topics remain reserved or
  # optional extension points.
  - /nav/odometry
  - /nav/registered_cloud
  - /nav/map_cloud
  - /nav/exploration_grid
  - /nav/global_path
  - /nav/local_path
  - /nav/cmd_vel
  - /nav/goal_pose

artifacts:
  map_pcd: map.pcd
  tomogram: tomogram.pickle
  occupancy_grid: occupancy.npz
  metadata: metadata.json

artifact_formats:
  map_pcd:
    path: map.pcd
    artifact_type: pcd_xyz_or_xyzi
    frame_role: map
    required_fields: [x, y, z]
    required_metadata: [source_profile, data_source, slam_source, frame_id, point_count, sha256]
  tomogram:
    path: tomogram.pickle
    artifact_type: pct_tomogram
    frame_role: map
    required_fields: [tomogram, resolution, origin]
    required_metadata: [source_map_sha256, source_profile, data_source, frame_id, shape]
  occupancy_grid:
    path: occupancy.npz
    artifact_type: numpy_occupancy_grid
    frame_role: map
    required_fields: [grid, resolution, origin]
    required_metadata: [source_map_sha256, source_profile, data_source, frame_id]
  metadata:
    path: metadata.json
    artifact_type: json
    frame_role: map
    required_fields: [source_profile, data_source, slam_source, localization_source, mapping_source, frame_id, created_at, artifacts]
    required_metadata: []

tf:
  map_frame: map
  odom_frame: odom
  body_frame: body
  model_base_frame: base_link
  lidar_frame: lidar_link
  real_lidar_frame: livox_frame
  camera_frame: camera_link
  simulator_world_frame: world
  axis_convention: x_forward_y_left_z_up
  body_aliases:
    - base_link
  lidar_aliases:
    - livox_frame
  links:
    map_to_odom:
      parent: map
      child: odom
      required: true
    odom_to_body:
      parent: odom
      child: body
      required: true
    body_to_lidar:
      parent: body
      child: lidar_link
      required: true
    body_to_camera:
      parent: body
      child: camera_link
      required: true

extrinsics:
  # All entries are body -> LiDAR static transforms in metres/radians.
  # Source adapters must normalize their native sensor data through one of
  # these profiles before publishing LingTu canonical clouds.
  body_to_lidar_profiles:
    real_mid360:
      parent: body
      child: livox_frame
      x: -0.011
      y: -0.02329
      z: 0.04412
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    gazebo_proxy:
      parent: body
      child: lidar_link
      x: 0.28
      y: 0.0
      z: 0.20
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    mujoco_thunder_v3:
      parent: body
      child: lidar_link
      x: 0.0
      y: 0.0
      z: 0.28
      roll: 0.0
      pitch: 0.0
      yaw: 0.0

data_formats:
  raw_livox_custom:
    topic: /points_raw
    ros_type: livox_ros_driver2/msg/CustomMsg
    frame_role: lidar_or_body_raw_fastlio_input
    required_fields: [offset_time, x, y, z, reflectivity, tag, line]
  raw_timed_pointcloud2:
    topic: /points_raw
    ros_type: sensor_msgs/msg/PointCloud2
    frame_role: lidar_or_body_raw_fastlio_input
    required_fields: [x, y, z, intensity, time, ring]
  registered_cloud:
    topic: /nav/registered_cloud
    ros_type: sensor_msgs/msg/PointCloud2
    frame_role: body
    required_fields: [x, y, z]
  map_cloud:
    topic: /nav/map_cloud
    ros_type: sensor_msgs/msg/PointCloud2
    frame_role: map_or_odom
    required_fields: [x, y, z]
  odometry:
    topic: /nav/odometry
    ros_type: nav_msgs/msg/Odometry
    frame_role: odom_to_body
  state_estimation_at_scan:
    topic: /nav/state_estimation_at_scan
    ros_type: nav_msgs/msg/Odometry
    frame_role: odom_to_body
  cmd_vel:
    topic: /nav/cmd_vel
    ros_type: geometry_msgs/msg/TwistStamped
    frame_role: body
  traversable_frontier_candidates:
    topic: /nav/traversable_frontiers
    ros_type: application/json
    frame_role: map
    required_fields: [id, centroid_3d, reachable_score, support_type, esdf_clearance_m, semantic_value, evidence_layers, reasons]

