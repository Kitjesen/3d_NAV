    - {source: /terrain_map_ext, target: /nav/terrain_map_ext, msg_format: map_cloud, scope: adapter_only}
    - {source: /way_point, target: /nav/way_point, msg_format: geometry_msgs/msg/PointStamped, scope: adapter_only}
    - {source: /speed, target: /nav/speed, msg_format: std_msgs/msg/Float32, scope: adapter_only}
    - {source: /path, target: /nav/local_path, msg_format: nav_msgs/msg/Path, scope: adapter_only}
    - {source: /stop, target: /nav/stop, msg_format: std_msgs/msg/Bool, scope: adapter_only}
    - {source: /slow_down, target: /nav/slow_down, msg_format: std_msgs/msg/Float32, scope: adapter_only}
    - {source: /navigation_boundary, target: /nav/navigation_boundary, msg_format: geometry_msgs/msg/PolygonStamped, scope: adapter_only}
    - {source: /added_obstacles, target: /nav/added_obstacles, msg_format: sensor_msgs/msg/PointCloud2, scope: adapter_only}
    - {source: /check_obstacle, target: /nav/check_obstacle, msg_format: std_msgs/msg/Bool, scope: adapter_only}
  path_follower:
    - {source: /Odometry, target: /nav/odometry, msg_format: odometry, scope: adapter_only}
    - {source: /path, target: /nav/local_path, msg_format: nav_msgs/msg/Path, scope: adapter_only}
    - {source: /cmd_vel, target: /nav/cmd_vel, msg_format: cmd_vel, scope: adapter_only}
    - {source: /planner_status, target: /nav/planner_status, msg_format: std_msgs/msg/String, scope: adapter_only}

adapter_relays:
  # Simulation bridge relays are explicit and must never be enabled on a
  # hardware ROS domain unless guarded by a hardware-safe command mux.
  cmu_unity:
    - {source: /state_estimation, target: /nav/odometry, msg_format: odometry, scope: adapter_only}
    - {source: /state_estimation_at_scan, target: /nav/state_estimation_at_scan, msg_format: state_estimation_at_scan, scope: adapter_only}
    - {source: /registered_scan, target: /nav/map_cloud, msg_format: map_cloud, scope: adapter_only}
    - {source: /terrain_map, target: /nav/terrain_map, msg_format: map_cloud, scope: adapter_only}
    - {source: /terrain_map_ext, target: /nav/terrain_map_ext, msg_format: map_cloud, scope: adapter_only}
    - {source: /nav/cmd_vel, target: /cmd_vel, msg_format: geometry_msgs/msg/TwistStamped, scope: adapter_only}

data_sources:
  # Different runtimes differ only by the source adapter at this boundary.
  # LingTu modules above the adapter consume the same canonical topics.
  in_process_stub:
    provider: in_process
    owns: [mock_odometry, mock_map, mock_commands]
    normalized_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    command_sink: module_graph_driver_cmd_vel
    source_outputs: []
    algorithm_entry_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    algorithm_context_outputs: []
    lidar_extrinsic_profile:
    slam_source: none
    localization_source: mock_or_in_process_odometry
    mapping_source: mock_or_in_process_map
  real_s100p:
    provider: hardware
    owns: [mid360_lidar, imu, robot_actuation]
    normalized_outputs: [/nav/lidar_scan, /nav/imu]
    command_sink: hardware_driver_after_cmd_vel_mux
    source_outputs: [/nav/lidar_scan, /nav/imu]
    algorithm_entry_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud, /nav/localization_health, /nav/localization_quality]
    algorithm_context_outputs: []
    lidar_extrinsic_profile: real_mid360
    slam_source: lingtu_fastlio_or_external_robot_slam
    localization_source: slam_localizer
    mapping_source: slam_map_cloud
  mujoco_module_graph:
    provider: mujoco
    owns: [physics, rendered_lidar, simulation_actuation]
    normalized_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    command_sink: mujoco_driver_module_cmd_vel
    source_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    algorithm_entry_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    algorithm_context_outputs: []
    lidar_extrinsic_profile: mujoco_thunder_v3
    slam_source: none
    localization_source: mujoco_sim_odometry
    mapping_source: mujoco_rendered_lidar_map_cloud
  mujoco_fastlio2_live:
    provider: mujoco
    owns: [physics, mid360_pattern_lidar, imu]
    normalized_outputs: [/points_raw, /imu_raw]
    command_sink: mujoco_velocity_adapter
    source_outputs: [/points_raw, /imu_raw]
    algorithm_entry_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    algorithm_context_outputs: []
    lidar_extrinsic_profile: mujoco_thunder_v3
    slam_source: lingtu_fastlio2
    localization_source: fastlio2_odometry
    mapping_source: fastlio2_map_cloud
  rosbag_fastlio2_replay:
    provider: replay
    owns: [recorded_lidar_imu, recorded_slam_outputs, no_actuation]
    normalized_outputs: [/points_raw, /imu_raw]
    command_sink: no_actuation_replay_sink
    source_outputs: [/points_raw, /imu_raw]
    algorithm_entry_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    algorithm_context_outputs: []
    lidar_extrinsic_profile: mujoco_thunder_v3
    slam_source: fastlio2_replay_or_recorded_slam
    localization_source: replayed_fastlio2_odometry
    mapping_source: replayed_fastlio2_map_cloud
  gazebo_industrial:
    provider: gazebo
    owns: [world_geometry, physics, rendered_lidar, simulation_actuation]
    normalized_outputs: [/nav/odometry, /nav/state_estimation_at_scan, /nav/registered_cloud, /nav/map_cloud, /nav/exploration_grid]
    command_sink: /lingtu/gazebo/cmd_vel
    source_outputs: [/model/thunder/odometry, /lingtu/gazebo/raw/lidar_points, /lingtu/gazebo/raw/lidar_scan]
    algorithm_entry_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    algorithm_context_outputs: [/nav/state_estimation_at_scan, /nav/exploration_grid]
    lidar_extrinsic_profile: gazebo_proxy
    slam_source: none
    localization_source: gazebo_sim_odometry
    mapping_source: gazebo_lidar_derived_map
  cmu_unity_external:
    provider: cmu_unity
    owns: [world_geometry, physics, external_registered_scan, external_tare]
    normalized_outputs: [/nav/odometry, /nav/state_estimation_at_scan, /nav/registered_cloud, /nav/map_cloud, /nav/terrain_map_ext, /exploration/way_point]
    command_sink: /cmd_vel
    source_outputs: [/state_estimation, /state_estimation_at_scan, /registered_scan, /terrain_map, /terrain_map_ext, /way_point]
    algorithm_entry_outputs: [/nav/odometry, /nav/registered_cloud, /nav/map_cloud]
    algorithm_context_outputs: [/nav/state_estimation_at_scan, /nav/terrain_map_ext, /exploration/way_point]
    lidar_extrinsic_profile:
    slam_source: external_cmu_registered_scan
    localization_source: cmu_state_estimation
    mapping_source: cmu_registered_scan_and_terrain_map_ext

profile_data_sources:
  stub: {data_source: in_process_stub, mode: framework_test}
  dev: {data_source: in_process_stub, mode: semantic_pipeline_test}
  sim_nav: {data_source: in_process_stub, mode: pure_python_navigation_sim}
  sim: {data_source: mujoco_module_graph, mode: module_graph_simulation}
  sim_mujoco_live: {data_source: mujoco_fastlio2_live, mode: mujoco_raw_mid360_fastlio_live}
  sim_gazebo: {data_source: gazebo_industrial, mode: gazebo_ros_native_simulation}
  sim_industrial: {data_source: gazebo_industrial, mode: gazebo_industrial_delivery_demo}
  sim_cmu_tare: {data_source: cmu_unity_external, mode: external_cmu_unity_tare_adapter}
  map: {data_source: real_s100p, mode: real_robot_mapping}
  nav: {data_source: real_s100p, mode: real_robot_saved_map_navigation}
  explore: {data_source: real_s100p, mode: real_robot_live_exploration}
  tare_explore: {data_source: real_s100p, mode: real_robot_tare_exploration}
  super_lio: {data_source: real_s100p, mode: real_robot_super_lio_mapping}
  super_lio_relocation: {data_source: real_s100p, mode: real_robot_super_lio_relocalization}
