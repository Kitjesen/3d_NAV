# ═══════════════════════════════════════════════════════════════
# semantic_exploration.yaml — 探索模式专用配置
#
# 与 semantic_planner.yaml 的关键差异:
#   - SCG auto_expand: true  (打通 SCG 管道, 每10帧自动扩展多面体)
#   - GCM enable: true       (全局覆盖掩码追踪探索进度)
#   - exploration.strategy: frontier  (FrontierScorer 实时探索, SG-Nav 限定目标确认)
#   - exploration.max_explore_steps: 50 (探索步数更多)
#   - llm.backend: mock      (默认不需要 API key, 可按需改为 kimi/openai)
#
# 使用场景:
#   ros2 launch navigation_explore.launch.py  (自动使用此配置)
#
# 如需使用真实 LLM 推理:
#   将 llm.backend 改为 "kimi" 并设置 MOONSHOT_API_KEY 环境变量
# ═══════════════════════════════════════════════════════════════

semantic_perception_node:
  ros__parameters:
    # ── 检测器后端 (同默认配置) ──
    detector_type: "yoloe"

    yoloe:
      model_size: "l"
      confidence: 0.3
      iou_threshold: 0.5
      tensorrt: false
      max_detections: 30

    # ── 语义编码 ──
    clip:
      enable: true
      model: "ViT-B/32"
      text_only: true

    # ── 默认检测类别 ──
    default_classes: "door . chair . fire extinguisher . person . desk . stairs . elevator . sign . trash can . sofa . table . bed . refrigerator . window"

    # ── 3D 投影 ──
    depth_scale: 0.001
    max_depth: 6.0
    min_depth: 0.3
    iou_threshold: 0.3
    clip_similarity_threshold: 0.75
    merge_distance: 0.5

    # ── 场景图 ──
    scene_graph:
      enable: true
      publish_rate: 2.0
      max_objects: 200

    semantic_map:
      enable: true

    target_fps: 15.0
    skip_frames: 1

    # ── 实例追踪 (增量更新) ──
    tracker:
      incremental_update: true
      update_radius: 5.0
      stale_remove_timeout: 30.0

    # ── SCG 路径规划 + 自动多面体扩展 (★ 探索模式核心) ──
    scg:
      enable: true
      request_topic: "/nav/scg/plan_request"
      result_topic: "/nav/scg/plan_result"
      # 探索模式新增: 每N帧从当前局部栅格自动扩展多面体并更新 SCG
      auto_expand: true
      expand_every_n_frames: 10     # 约 1.5Hz (@ 15Hz 感知频率)
      min_new_polyhedra: 2          # 少于此数量的新多面体时跳过更新

    # ── 全局覆盖掩码 (★ 探索模式核心) ──
    gcm:
      enable: true
      resolution: 0.5               # 格子大小 (米), 粗粒度追踪覆盖进度


semantic_planner_node:
  ros__parameters:
    # ── LLM 配置 (探索模式默认 mock, 无需 API key) ──
    # 改为 "kimi" 并设置 MOONSHOT_API_KEY 可使用真实推理
    llm:
      backend: "mock"
      model: "mock"
      api_key_env: "MOONSHOT_API_KEY"
      timeout_sec: 5.0
      max_retries: 1
      temperature: 0.2

    # ── 备用 LLM ──
    llm_fallback:
      backend: "mock"
      model: "mock"
      api_key_env: "DASHSCOPE_API_KEY"
      timeout_sec: 5.0
      max_retries: 1

    # ── 目标解析 (降低阈值, 更容易触发探索) ──
    goal_resolution:
      confidence_threshold: 0.5     # 低于此置信度触发 Frontier 探索
      vision_threshold: 0.5
      replan_on_failure: true
      max_replan_attempts: 3
      fast_path_threshold: 0.70

    # ── 探索策略 (★ 核心参数) ──
    exploration:
      enable: true
      strategy: "frontier"          # frontier = FrontierScorer 实时探索 (USS-Nav style)
                                    # SG-Nav 子图推理仅在目标确认阶段按需触发
                                    # 如需 SG-Nav 全程探索 (慢, <1Hz), 改为 "sg_nav"
      max_explore_steps: 50         # 探索模式步数更多
      step_distance: 2.0
      costmap_topic: "/nav/costmap"
      frontier_score_threshold: 0.15   # 降低门槛, 接受更多候选 frontier
      frontier_min_size: 5
      frontier_max_count: 10
      frontier_cluster_radius_cells: 3

      # Frontier 评分权重 (探索模式调整: 提高新颖度权重)
      frontier_distance_weight: 0.25
      frontier_novelty_weight: 0.35    # 新颖度权重提高 (鼓励探索新区域)
      frontier_language_weight: 0.20
      frontier_grounding_weight: 0.20  # 降低, 因为目标可能未知

      frontier_novelty_distance: 5.0
      frontier_nearby_object_radius: 3.0
      frontier_grounding_angle_threshold: 0.7854
      frontier_cooccurrence_bonus: 0.25
      frontier_grounding_spatial_bonus: 0.1
      frontier_grounding_keyword_bonus: 0.4
      frontier_grounding_relation_bonus: 0.15
      frontier_vision_weight: 0.15

      # SG-Nav 参数 (sg_nav 策略已启用)
      sgnav:
        max_subgraphs: 6
        use_llm_reasoning: false     # mock 模式下关闭 LLM 推理
        heuristic_weight: 0.60
        llm_weight: 0.40
        frontier_base_weight: 0.55
        room_gate_weight: 0.25
        interp_decay_distance: 4.0
        credibility_decay: 0.9
        false_positive_penalty: 0.2
        reject_threshold: 0.25
        min_confidence_for_bypass: 0.85
        arrival_reperception: true
        continuous_reperception: true
        reperception_interval_m: 2.0
        reperception_n_max: 10
        reperception_s_thresh: 0.8

    # ── 融合权重 ──
    fusion:
      weight_label_match: 0.35
      weight_clip_sim: 0.35
      weight_detector_score: 0.15
      weight_spatial_hint: 0.15
      no_clip_weight_label: 0.55
      no_clip_weight_detector: 0.25
      no_clip_weight_spatial: 0.20
      detector_count_normalize: 3

    # ── Vision Grounding ──
    vision:
      enable: true
      image_topic: "/camera/color/image_raw"
      verify_threshold: 0.5

    # ── 执行参数 ──
    execution:
      arrival_radius: 1.0
      monitor_hz: 1.0
      look_around_hz: 10.0
      default_timeout: 600.0         # 探索模式超时更长

    # ── 拓扑记忆 ──
    topo_memory:
      new_node_distance: 2.0
      max_nodes: 1000               # 探索模式记忆节点更多

    # ── 安全约束 ──
    safety:
      max_goal_distance: 50.0
      forbidden_zones: []

    # ── FSM ──
    fsm:
      mode: "implicit"
      implicit:
        weights_path: ""
        strict: false

    prompt_template_dir: ""
