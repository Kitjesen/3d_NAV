# Semantic scoring weights — tunable without code changes.
#
# These values are loaded at runtime by three modules:
#   sgnav_heuristic  -> src/semantic/planner/semantic_planner/sgnav_reasoner.py
#   fast_path_fusion -> src/semantic/planner/semantic_planner/fast_path.py
#   frontier_scorer  -> src/semantic/planner/semantic_planner/frontier_scorer.py
#
# If a section is missing the module falls back to the hardcoded defaults
# and logs an INFO message pointing here.
#
# All weights within a section must be non-negative; they need not sum to 1.0
# (modules normalise internally where required).

sgnav_heuristic:
  # Subgraph scoring weights used by SGNavReasoner._score_subgraphs_heuristic()
  keyword: 0.55
  relation: 0.20
  distance: 0.15
  richness: 0.10

fast_path_fusion:
  # Multi-source confidence fusion used by FastPathMixin.fast_resolve()
  label: 0.35
  clip: 0.35
  detector: 0.15
  spatial: 0.15

frontier_scorer:
  # Semantic prior contribution weight used by FrontierScorer.score_frontiers()
  semantic_prior_weight: 0.15
