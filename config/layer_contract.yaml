# ============================================================================
# LingTu 层次架构合约 (Layer Contract)
# ============================================================================
#
# 两个正交维度:
#
# 1. 层 (Layer, L0-L6):  技术依赖方向, 谁 import 谁
#    规则: Layer N 只能依赖 Layer 0..N-1, 禁止反向依赖。
#    层间通信一律走 ROS2 话题 (见 topic_contract.yaml), 不直接 import 上层代码。
#
# 2. 环 (Ring, R1-R3):  认知控制维度, 谁打断谁
#    Ring 1 (反射弧):  <50ms,   始终运行, 可打断 Ring 2/3
#    Ring 2 (认知环):  100ms-10s, 感知→规划→执行→评估闭环
#    Ring 3 (对话环):  秒~分钟,  用户意图→统一状态
#    规则: 内环可打断外环, 外环不可绕过内环。
#
# 数据流:
#   命令方向 (↓): 用户 → L6 → L5 → L4 → L3 → L2 → L1
#   感知方向 (↑): L1 → L2 → L3 → L4 → L5 → L6 → 用户
#   安全方向 (⊥): Ring 1 横切所有 Layer, 随时可发 stop=2
#
# ============================================================================

layers:

  # ── L0: 基础设施 ─────────────────────────────────────────────
  L0_common:
    description: "共享防御基础设施 — 输入校验、数值消毒、重试/超时装饰器"
    packages:
      - semantic_common
    depends_on: []          # 纯 Python, 零 ROS 依赖
    exports:
      python:
        - semantic_common.robustness   # async_timeout, gpu_safe, retry, retry_async
        - semantic_common.validation   # validate_bgr, validate_depth, normalize_quaternion
        - semantic_common.sanitize     # sanitize_float, safe_json_dumps, safe_json_loads

  # ── L1: 硬件驱动 ─────────────────────────────────────────────
  L1_drivers:
    description: "传感器与执行器接口 — LiDAR 驱动、机器人电机/IMU、gRPC CMS"
    packages:
      - livox_ros_driver2    # Livox Mid-360 LiDAR (C++)
      - robot_driver         # han_dog_bridge: cmd_vel → gRPC Walk(), IMU → Odometry
    depends_on: [L0_common]
    topics_published:
      - /livox/lidar         # PointCloud2, Livox CustomMsg
      - /Odometry            # han_dog_bridge IMU 姿态 + cmd_vel 位置积分
      - /robot_state         # 16 DOF 关节 + IMU + 电池
      - /driver/watchdog_active  # 看门狗状态
    topics_subscribed:
      - /cmd_vel             # TwistStamped 速度指令
      - /stop                # Int8 安全信号
      - /nav/odometry        # SLAM 位置重置 (防止积分漂移)

  # ── L2: SLAM ─────────────────────────────────────────────────
  L2_slam:
    description: "定位与建图 — LiDAR SLAM、回环检测、ICP 重定位"
    packages:
      - fastlio2             # Fast-LIO2 前端 (C++)
      - pointlio             # Point-LIO 替代 (C++)
      - pgo                  # 回环优化 (C++)
      - localizer            # ICP 重定位 (C++)
      - hba                  # 历史对齐 (C++)
      - interface            # 服务接口定义 (save_map, relocalize)
    depends_on: [L1_drivers]    # 订阅 LiDAR 数据
    topics_published:
      - /nav/odometry           # SLAM 里程计 (权威位置源)
      - /nav/registered_cloud   # 配准点云 (body frame)
      - /nav/map_cloud          # 地图点云 (world frame)
      - /nav/localization_quality  # ICP 质量分数

  # ── L3: 环境感知 ─────────────────────────────────────────────
  L3_perception:
    description: "环境理解 — 地形可通行性分析、语义目标检测、场景图构建"
    packages:
      - terrain_analysis       # 地面高程 + 可通行性 (C++)
      - terrain_analysis_ext   # 扩展地形分析 (C++)
      - sensor_scan_generation # 局部扫描生成 (C++)
      - semantic_perception    # YOLO-World + CLIP + ConceptGraphs 场景图 (Python)
    depends_on: [L0_common, L2_slam]
    topics_published:
      - /nav/terrain_map          # 基础地形 PointCloud2
      - /nav/terrain_map_ext      # 扩展地形 PointCloud2
      - /nav/semantic/scene_graph      # JSON 场景图
      - /nav/semantic/detections_3d    # 3D 检测结果
    topics_subscribed:
      - /nav/odometry
      - /nav/map_cloud
      - /nav/registered_cloud

  # ── L4: 路径规划 ─────────────────────────────────────────────
  L4_planning:
    description: "局部避障 + 全局路径规划 + 语义目标解析"
    packages:
      # 局部
      - local_planner          # 局部避障 + pathFollower (C++)
      # 全局
      - PCT_planner            # PCT A* (C++ .so, 生产)
      - pct_planner_astar      # 纯 Python A* (开发备用)
      - far_planner            # FAR Planner (替代方案)
      # 语义
      - semantic_planner       # Fast-Slow 目标解析 + Frontier 探索 (Python)
    depends_on: [L0_common, L3_perception]
    topics_published:
      - /nav/global_path          # 全局规划路径
      - /path                     # 局部规划路径
      - /nav/cmd_vel              # pathFollower 速度输出
      - /nav/stop                 # 近场急停
      - /nav/slow_down            # 减速信号
      - /nav/planner_status       # 规划器状态
      - /nav/semantic/resolved_goal    # 语义解析后的目标
      - /nav/semantic/status           # 语义规划器状态
      - /nav/voice/response            # 语音/文本回复
      - /nav/patrol/command            # 巡检命令 (语义解析后发出)
      - /nav/poi/command               # POI 命令 (语义解析后发出)
      - /nav/map/command               # 地图命令 (语义解析后发出)
    topics_subscribed:
      - /nav/terrain_map
      - /nav/way_point
      - /nav/goal_pose
      - /nav/semantic/scene_graph
      - /nav/semantic/instruction

  # ── L5: 任务编排 ─────────────────────────────────────────────
  L5_orchestration:
    description: "航点跟踪 + 任务生命周期 FSM + 运营服务 — 串联全局规划与局部执行"
    packages:
      - pct_adapters           # pct_path_adapter: 路径→航点推进
                               # mission_arc: 任务 FSM + 多航点巡检 + 取消
      - nav_services           # map_manager: 地图生命周期管理 + POI
                               # patrol_manager: 巡检路线管理
                               # geofence_manager: 电子围栏 → navigation_boundary
                               # task_scheduler: 定时任务调度
                               # mission_logger: 任务历史记录
    depends_on: [L0_common, L4_planning]
    topics_published:
      - /nav/way_point            # 当前航点 → local_planner
      - /nav/adapter_status       # 航点事件 JSON
      - /nav/mission_status       # 任务状态 JSON (state, progress, patrol, distance)
      - /nav/patrol_goals         # 巡检航点列表 → mission_arc
      - /nav/cancel               # 任务取消信号
      - /nav/navigation_boundary  # 电子围栏多边形 → local_planner
    topics_subscribed:
      - /nav/global_path
      - /nav/odometry
      - /nav/planner_status
      - /nav/stop
      - /nav/dialogue_state

  # ── L6: 用户交互 ─────────────────────────────────────────────
  L6_interaction:
    description: "用户界面网关 — gRPC、Flutter App、OTA、遥测"
    packages:
      - remote_monitoring      # gRPC gateway :50051 (C++)
      # 外部: Flutter App (client/flutter_monitor/)
    depends_on: [L5_orchestration]    # 读 mission_status, 发 goal_pose
    topics_published:
      - /nav/goal_pose            # 用户下发目标 (via gRPC / RViz)
      - /nav/semantic/instruction  # 自然语言导航指令
      - /nav/speed                # 速度倍率
      - /nav/cancel               # 用户取消任务
      - /nav/map/command          # 地图管理命令
      - /nav/poi/command          # POI 管理命令
      - /nav/patrol/command       # 巡检管理命令
      - /nav/geofence/command     # 电子围栏命令
      - /nav/schedule/command     # 定时任务命令
      - /nav/history/query        # 历史查询
    topics_subscribed:
      - /nav/mission_status
      - /nav/adapter_status
      - /nav/planner_status
      - /nav/odometry
      - /nav/cmd_vel
      - /nav/dialogue_state       # 统一状态
      - /nav/map/response
      - /nav/poi/response
      - /nav/patrol/response
      - /nav/geofence/response
      - /nav/schedule/response
      - /nav/history/response

# ============================================================================
# 依赖矩阵 (✓ = 允许, ✗ = 禁止)
# ============================================================================
#
#               L0   L1   L2   L3   L4   L5   L6
#   L0 common   -    ✗    ✗    ✗    ✗    ✗    ✗
#   L1 driver   ✓    -    ✗    ✗    ✗    ✗    ✗
#   L2 slam     ✗    ✓    -    ✗    ✗    ✗    ✗
#   L3 percep   ✓    ✗    ✓    -    ✗    ✗    ✗
#   L4 plan     ✓    ✗    ✗    ✓    -    ✗    ✗
#   L5 orch     ✓    ✗    ✗    ✗    ✓    -    ✗
#   L6 interact ✗    ✗    ✗    ✗    ✗    ✓    -
#
# L0 是唯一允许跨层 import 的包 (所有 Python 层都可以 import semantic_common)
# 其余层间通信全部通过 ROS2 话题, 不允许直接 Python import
# ============================================================================

# ============================================================================
# 三环认知架构 (Rings) — 正交于 Layer 的控制维度
# ============================================================================
#
# 环不是层。环是嵌套的控制回路，按时间尺度和安全优先级划分。
# 每个环可以跨越多个 Layer。
#
# nav_rings 包 (L0 + 跨层观察者) 实现以下三个环:
#
rings:

  Ring1_reflex:
    description: "反射弧 — 始终运行, 内环最高优先级, 可打断一切"
    node: safety_monitor
    hz: 20
    latency: "<50ms"
    responsibilities:
      - 聚合所有安全信号 (stop, watchdog, stuck)
      - 监控关键链路心跳 (SLAM, driver)
      - 链路断裂时主动升级 (发 stop=2)
      - 定位质量监控 (localization_quality < 0.3 → WARN)
      - SLAM 丢失自动恢复 (调用 relocalize 服务, 30s 冷却)
    publishes: /nav/safety_state
    subscribes:
      - /nav/stop
      - /nav/slow_down
      - /driver/watchdog_active
      - /nav/planner_status
      - /nav/odometry              # SLAM 心跳
      - /nav/terrain_map           # terrain 心跳
      - /nav/cmd_vel               # pathFollower 心跳
      - /nav/localization_quality  # ICP 匹配质量
    services_called:
      - /nav/relocalize            # SLAM 丢失时自动重定位

  Ring2_cognition:
    description: "认知环 — 闭环评估, 把流水线变成控制回路"
    node: evaluator
    hz: 5
    latency: "100ms~10s"
    responsibilities:
      - 跨径偏差 (cross_track_error)
      - 目标接近率 (progress_rate)
      - 停滞检测 (stall_time)
      - 航向偏差 (heading_error)
    publishes: /nav/execution_eval
    subscribes:
      - /nav/odometry
      - /nav/global_path
      - /nav/way_point
      - /nav/cmd_vel

  Ring3_dialogue:
    description: "对话环 — 统一用户状态, 一个话题说清机器人在干什么"
    node: dialogue_manager
    hz: 2
    latency: "秒级"
    responsibilities:
      - 聚合 mission + planner + adapter + semantic + safety + eval
      - 生成人类可读状态描述
      - ETA 估算
    publishes: /nav/dialogue_state
    subscribes:
      - /nav/mission_status
      - /nav/planner_status
      - /nav/adapter_status
      - /nav/semantic/status
      - /nav/safety_state
      - /nav/execution_eval
      - /nav/odometry
      - /nav/semantic/instruction
      - /nav/voice/response            # 语音回复 (来自 planner_node)
# ============================================================================
