# DUFOMap config — Lingtu / Livox Mid-360 tuned.
#
# 默认参考 https://github.com/KTH-RPL/dufomap/blob/main/assets/config.toml
# 为 KITTI 64 线密激光调的。Livox Mid-360 非重复扫描 ~2k 点/帧, 单帧密度
# 比 KITTI 低一个量级, 需要偏松的阈值让稀疏帧也能贡献有效信息。
#
# 首次生效的地图: 还没验证, 需要森哥建一张有人走动的图后迭代。
# 调参原则:
#   - inflate_unknown 调大 → 补稀疏区域的未观测空洞
#   - inflate_hits_dist 收紧 → 10cm voxel 下 0.15m 够用
#   - min_range 加大 → 过滤狗自己腿部的 LiDAR 返回
#   - max_range 设 30m → Livox Mid-360 标称量程 40m, 30m 外信噪比差

[important]
resolution = 0.1            # 10cm voxel, 够室内 + 控制内存
inflate_unknown = 2         # d_p, 原 1 → 2 (对稀疏 LiDAR 更鲁棒)
inflate_hits_dist = 0.15    # d_s, 原 0.2 → 0.15 (匹配 resolution × 1.5)


# ----------- 高阶参数, 默认不改 --------

[integration]
inflate_unknown_compensation = true
ray_passthrough_hits = false
down_sampling_method = "center"       # ["none", "center", "centroid", "uniform"]
min_range = 0.3                       # 狗腿 + 躯干半径 ~0.25m, 0.3m 安全
max_range = 30.0                      # Livox Mid-360 噪点在 30m+
only_valid = false
hit_depth = 0

[propagate]
propagate = true

[clustering]
cluster = false                       # 保存阶段不做聚类, DUFOMap 自己的 void
                                      # detection 已经够用, 聚类会误杀近地面

[output]
filename = "dufomap_output"           # 产物名 (map_dir/dufomap_output.pcd)

[printing]
verbose = true
debug = false
