# LingTu Endpoint Registry — single source of truth for all default ports and URLs.
#
# Every LingTu module that listens on a port or connects to a remote host should
# read its default from this file.  Tests and deployments may override via
# environment variables (LINGTU_*) or constructor kwargs.
#
# Convention:
#   - Keys use snake_case, grouped by domain.
#   - Only DEFAULT values live here.  Runtime overrides (--port, env vars) take
#     precedence.
#   - Omit secrets (passwords, API keys).  Those belong in env vars or a vault.
#
# Last reviewed: 2026-06-01

# ── REST / WS / SSE gateway ─────────────────────────────────────────
gateway:
  rest_port: 5050               # FastAPI: /api/v1/*, /health, /ready, SSE /api/v1/events
  mcp_port: 8090                # MCPServerModule: JSON-RPC 2.0 at http://host:8090/mcp
  teleop_port: 5050             # Teleop joystick + camera WS on /ws/teleop (same port as REST)

# ── Brainstem (quadruped motor control) ──────────────────────────────
brainstem:
  default_host: "127.0.0.1"     # gRPC host (dog_host in robot_config.yaml)
  default_port: 13145            # gRPC port (dog_port in robot_config.yaml)

# ── Simulation ──────────────────────────────────────────────────────
sim:
  ros2_master_uri: "http://127.0.0.1:11311"   # ROS 2 master / discovery server
  # No separate port — simulated stacks reuse the same gateway port.

# ── Dashboard / Web UI ──────────────────────────────────────────────
web:
  dashboard_port: 8066          # Reserved for future dashboard (not currently used)

# ── Vision / Reconstruction ─────────────────────────────────────────
vision:
  detection_port: 7890          # Reconstruction server (KeyframeExporterModule)

# ── Rerun 3D visualization ──────────────────────────────────────────
rerun:
  web_port: 9090                # Rerun web viewer
  grpc_port: 9877               # Rerun gRPC data ingest

# ── WebRTC / go2rtc ─────────────────────────────────────────────────
webrtc:
  go2rtc_api_port: 1984         # go2rtc internal API (loopback only)
  webrtc_tcp_port: 8555         # go2rtc WebRTC TCP fallback

# ── LiDAR hardware ──────────────────────────────────────────────────
lidar:
  livox_default_ip: "192.168.1.115"   # Livox MID-360 factory-default IP
  host_pc_ip: "192.168.1.5"           # Host PC IP in LiDAR subnet
  livox_sdk_port: 56100               # Livox SDK2 command port

# ── GNSS NTRIP ──────────────────────────────────────────────────────
gnss:
  ntrip_default_port: 2101            # Default NTRIP caster port

# ── Device registry ─────────────────────────────────────────────────
device_registry:
  config_path: "config/devices.yaml"   # Default device registry path
