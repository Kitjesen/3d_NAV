# FAR Planner 配置 — 灵途导航系统
# 基于 CMU autonomy_stack_go2 默认配置，适配我们的四足机器人参数
#
# 使用方式:
#   planner_profile:=far   (在 launch 中切换)
#
# 参考论文: FAR Planner: Fast, Attemptable Route Planner (IROS 2022)

far_planner:
  ros__parameters:
    # ── 核心参数 ──
    main_run_freq: 5.0        # 主循环频率 (Hz), 论文中矿洞用 2.5Hz
    voxel_dim: 0.1            # 体素分辨率 (m)
    robot_dim: 0.8            # 机器人半径 (m), 我们的四足比 Go2 稍大
    vehicle_height: 0.6       # 机器人高度 (m)
    sensor_range: 15.0        # 传感器有效范围 (m), Mid-360 有效距离
    terrain_range: 10.0       # 地形分析范围 (m)
    local_planner_range: 3.0  # 局部规划器范围 (m), 与 localPlanner 匹配
    visualize_ratio: 0.4      # 可视化降采样比例
    is_viewpoint_extend: true
    is_multi_layer: false     # 单层模式 (户外/平面环境)
    is_opencv_visual: false   # 关闭 OpenCV 窗口 (无显示器)
    is_static_env: false      # 动态环境 (支持新障碍物)
    is_pub_boundary: false    # 不发布导航边界
    is_debug_output: false    # 生产模式关闭调试
    is_attempt_autoswitch: true  # 自动切换到尝试性导航
    world_frame: map          # 与灵途 TF 帧一致

    # ── Graph Messager ──
    graph_msger/robot_id: 1

    # ── Map Handler ──
    map_handler/floor_height: 2.5     # 天花板高度 (m), 户外可以高一些
    map_handler/cell_length: 3.0      # 网格单元大小 (m)
    map_handler/map_grid_max_length: 200.0  # 最大地图范围 (m)
    map_handler/map_grad_max_height: 10.0   # 最大高度范围 (m)

    # ── Utility ──
    util/angle_noise: 16.0            # 角度噪声 (度)
    util/accept_max_align_angle: 4.0  # 最大对齐角度 (度)
    util/obs_inflate_size: 1          # 障碍物膨胀格数
    util/new_intensity_thred: 2.0     # 新点强度阈值
    util/terrain_free_Z: 0.15         # 地形可通过 Z 阈值 (m)
    util/dyosb_update_thred: 4        # 动态障碍更新阈值
    util/new_point_counter: 3
    util/dynamic_obs_dacay_time: 1.0  # 动态障碍衰减 (s)
    util/new_points_decay_time: 1.0   # 新点衰减 (s)

    # ── Dynamic Graph ──
    graph/connect_votes_size: 5
    graph/clear_dumper_thred: 3
    graph/node_finalize_thred: 5
    graph/filter_pool_size: 6

    # ── Corner Detector ──
    c_detector/resize_ratio: 3.0
    c_detector/filter_count_value: 4
    c_detector/is_save_img: false

    # ── Graph Planner ──
    g_planner/converge_distance: 0.3    # 收敛距离 (m)
    g_planner/goal_adjust_radius: 1.5   # 目标调整半径 (m)
    g_planner/free_counter_thred: 7
    g_planner/reach_goal_vote_size: 3
    g_planner/path_momentum_thred: 3
