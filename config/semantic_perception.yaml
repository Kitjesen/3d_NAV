# Semantic perception defaults tuned for higher person recall.
semantic_perception_node:
  ros__parameters:
    detector_type: "bpu"

    yoloe:
      model_size: "l"
      confidence: 0.25
      iou_threshold: 0.45
      tensorrt: false
      max_detections: 64

    bpu:
      model_path: ""
      confidence: 0.22
      iou_threshold: 0.45
      max_detections: 64
      min_box_size_px: 12

    yolo_world:
      model_size: "s"
      confidence: 0.40
      iou_threshold: 0.45
      tensorrt: false

    clip:
      enable: false
      model: "ViT-B/32"
      text_only: true

    grounding_dino:
      config_path: ""
      weights_path: ""
      box_threshold: 0.35
      text_threshold: 0.25

    default_classes: "door . chair . fire extinguisher . person . desk . stairs . elevator . sign . trash can . sofa . car . truck . bus . bicycle . motorcycle . bench . backpack . laptop . tv . traffic light . stop sign . potted plant . bed . toilet . bottle . cup . dog . cat"

    laplacian_threshold: 100.0

    depth_scale: 0.001
    max_depth: 6.0
    min_depth: 0.3

    iou_threshold: 0.3
    clip_similarity_threshold: 0.75
    merge_distance: 1.5

    scene_graph:
      enable: true
      publish_rate: 2.0
      max_objects: 200

    semantic_map:
      enable: true
    semantic_map_path: "maps/semantic/scene_graph.json"

    target_fps: 15.0
    skip_frames: 1

reconstruction_node:
  ros__parameters:
    publish_rate: 1.0
    voxel_size: 0.05
    camera_frame: "camera_color_optical_frame"
    world_frame: "map"
    save_dir: "maps/reconstruction"
    min_points_to_publish: 1000
