# GenZ-ICP config for S100P (Livox Mid-360 + corridor/outdoor)
# Based on corridor.yaml with adjustments for Livox non-repetitive scan
# Refer to ros/config/parameter_tuning_guide.md for tuning

deskew: true              # Livox needs deskew (built-in IMU available)
max_range: 50.0           # Mid-360 max effective range
min_range: 0.3            # Livox min range
voxel_size: 0.3           # Slightly larger for Livox density
desired_num_voxelized_points: 1500   # Match Livox point count per scan
planarity_threshold: 0.2  # Key param: controls planar vs non-planar split
max_points_per_voxel: 1
initial_threshold: 2.0
min_motion_th: 0.05       # Lower for quadruped (slower than car)
max_num_iterations: 100
convergence_criterion: 0.0001
