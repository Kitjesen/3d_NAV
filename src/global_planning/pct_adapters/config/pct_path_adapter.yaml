/**:
  ros__parameters:
    # Path downsample spacing (meters)
    waypoint_distance: 0.5
    # Arrival distance to advance to next waypoint (meters)
    arrival_threshold: 0.5
    # 卡顿检测超时 (s): 超过此时间无进展则发布 stuck 事件
    stuck_timeout_sec: 30.0
    # Lookahead distance (meters)
    lookahead_dist: 1.0
