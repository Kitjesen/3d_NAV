# Habitat ObjectNav 评测配置
# NaviMind (灵途) — BA-HSG + Fast-Slow 双进程语义导航

# ── 传感器配置 ──
sensor:
  rgb:
    width: 256
    height: 256
    hfov: 79
    position: [0, 0.88, 0]  # 相机高度 (m)
  depth:
    width: 256
    height: 256
    hfov: 79
    min_depth: 0.0
    max_depth: 10.0
  semantic:
    width: 256
    height: 256
    hfov: 79
  gps:
    dimensionality: 2
  compass:
    dimensionality: 1

# ── 动作空间 ──
action:
  move_forward: 0.25     # 米
  turn_left: 30          # 度
  turn_right: 30         # 度

# ── 评测参数 ──
eval:
  max_steps: 1000  # 增加步数 (TV DTG=12m 需要更多探索)
  success_distance: 1.0  # 米 (HM3D ObjectNav 标准: 1.0m)
  dataset: "hm3d"
  split: "val_mini"
  max_navigate_steps: 40   # 导航到目标的最大步数; 尽快失败，留更多步数给探索

# ── 场景图构建参数 (BA-HSG) ──
scene_graph:
  merge_distance: 0.8
  iou_threshold: 0.3
  clip_threshold: 0.75
  max_objects: 300
  stale_timeout: 9999.0   # 评测中不清理过期物体

# ── Fast Path 参数 ──
fast_path:
  threshold: 0.75
  confidence_threshold: 0.50

# ── 探索策略 ──
exploration:
  rotate_steps: 8          # 240° 扫描，节省旋转步数，覆盖更多区域
  frontier_distance: 1.0   # 米, 小步长探索: 更精细覆盖, 易接近家具 (1.0m = 4 个前进步)
  cell_size: 0.5           # 米, 访问网格分辨率

# ── 消融实验 ──
# 通过命令行 --ablation 覆盖, 这里是默认值
ablation:
  name: "full"
  # full         — 完整 NaviMind (BA-HSG + FOV + 层次图 + Fast Path)
  # no_belief    — 去掉贝叶斯信念 (不传 FOV, score 降低)
  # no_fov       — 去掉 FOV-aware 负面证据
  # no_hierarchy — 平坦物体列表替代层次场景图
  # always_llm   — 跳过 Fast Path, 纯探索 (模拟 SG-Nav 依赖 LLM)
